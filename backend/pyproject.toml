[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [".venv", "venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W", "DJ"]
ignore = [
    "E501",  # handled by black
    "B008",  # Django uses callables in defaults
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]
combine-as-imports = true

[tool.black]
line-length = 100
target-version = ["py313"]
extend-exclude = '''
/(
    migrations
  | \.venv
  | venv
)/
'''
